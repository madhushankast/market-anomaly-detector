version: '3.8'

services:
  db:
    image: postgres:16
    container_name: market-db
    restart: always
    environment:
      POSTGRES_USER: adminmst
      POSTGRES_PASSWORD: adminpass
      POSTGRES_DB: market_db
    ports:
      - "5432:5432"

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"

  api:
    build: .
    container_name: market-api
    restart: always
    depends_on:
      - db
      - kafka
    ports:
      - "8000:8000"

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: market-frontend
    ports:
      - "5173:5173"
    depends_on:
      - api
    # --- ADD THIS CONFIGURATION BLOCK ---
    volumes:
      - ./frontend:/app             # Maps your local frontend folder to the container workspace
      - /app/node_modules          # Avoids overwriting the container's npm packages with local files
    environment:
      - VITE_WATCH_USE_POLLING=true # Backup trigger for the file-watching utility